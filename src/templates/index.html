<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>网易云音乐热歌榜数据分析</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            text-align: center;
            padding: 40px 0;
            background: linear-gradient(90deg, #ff6b6b, #ee5a24);
            border-radius: 15px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(255, 107, 107, 0.3);
        }

        header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.1);
            padding: 25px;
            border-radius: 12px;
            text-align: center;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
        }

        .stat-value {
            font-size: 2.5rem;
            font-weight: bold;
            background: linear-gradient(90deg, #ff6b6b, #ee5a24);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .stat-label {
            font-size: 0.95rem;
            opacity: 0.8;
            margin-top: 8px;
        }

        .btn {
            display: inline-block;
            padding: 14px 30px;
            font-size: 1.1rem;
            font-weight: 600;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            text-align: center;
        }

        .btn-primary {
            background: linear-gradient(90deg, #ff6b6b, #ee5a24);
            color: white;
        }

        .btn-primary:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 25px rgba(255, 107, 107, 0.4);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .btn-group {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .charts-section {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 25px;
            margin-bottom: 30px;
        }

        .chart-card {
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .chart-card h3 {
            margin-bottom: 15px;
            font-size: 1.2rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 10px;
        }

        .chart-image {
            width: 100%;
            height: auto;
            border-radius: 8px;
        }

        .data-table {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .data-table table {
            width: 100%;
            border-collapse: collapse;
        }

        .data-table th,
        .data-table td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .data-table th {
            background: rgba(255, 107, 107, 0.2);
            font-weight: 600;
        }

        .data-table tr:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .status-success {
            background: rgba(46, 213, 115, 0.2);
            color: #2ed573;
        }

        .status-error {
            background: rgba(231, 76, 60, 0.2);
            color: #e74c3c;
        }

        .status-loading {
            background: rgba(52, 152, 219, 0.2);
            color: #3498db;
        }

        .loading-spinner {
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top-color: #ff6b6b;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error-message {
            background: rgba(231, 76, 60, 0.1);
            border: 1px solid rgba(231, 76, 60, 0.3);
            border-radius: 8px;
            padding: 15px;
            color: #e74c3c;
            margin-bottom: 20px;
        }

        .success-message {
            background: rgba(46, 213, 115, 0.1);
            border: 1px solid rgba(46, 213, 115, 0.3);
            border-radius: 8px;
            padding: 15px;
            color: #2ed573;
            margin-bottom: 20px;
        }

        .footer {
            text-align: center;
            padding: 20px;
            margin-top: 40px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            opacity: 0.6;
            font-size: 0.9rem;
        }

        @media (max-width: 768px) {
            header h1 {
                font-size: 1.8rem;
            }

            .charts-section {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🎵 网易云音乐热歌榜数据分析</h1>
            <p>实时追踪热门歌曲，深度分析音乐趋势</p>
        </header>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-value" id="songCount">0</div>
                <div class="stat-label">歌曲数量</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="artistCount">0</div>
                <div class="stat-label">歌手数量</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="topArtist">-</div>
                <div class="stat-label">热门歌手</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="dataTime">-</div>
                <div class="stat-label">更新时间</div>
            </div>
        </div>

        <div class="btn-group">
            <button class="btn btn-primary" onclick="scrapeData()">
                📥 爬取数据
            </button>
            <button class="btn btn-secondary" onclick="analyzeData()">
                📊 数据分析
            </button>
            <button class="btn btn-secondary" onclick="refreshCharts()">
                🔄 刷新图表
            </button>
            <button class="btn btn-secondary" onclick="exportCSV()">
                📤 导出CSV
            </button>
            <a href="/player" class="btn btn-secondary" style="background: linear-gradient(90deg, #6c5ce7, #a29bfe);">
                🎧 榜单听歌
            </a>
        </div>

        <div id="statusMessage"></div>

        <div id="chartsContainer" style="display: none;">
            <div class="charts-section">
                <div class="chart-card">
                    <h3>📊 TOP10 歌手柱状图</h3>
                    <img id="barChart" class="chart-image" alt="柱状图" />
                </div>
                <div class="chart-card">
                    <h3>☁️ 歌手词云图</h3>
                    <img id="wordcloudChart" class="chart-image" alt="词云图" />
                </div>
            </div>

            <div class="data-table">
                <h3 style="padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.1);">🎶 歌曲榜单</h3>
                <table>
                    <thead>
                        <tr>
                            <th>排名</th>
                            <th>歌曲名称</th>
                            <th>歌手</th>
                        </tr>
                    </thead>
                    <tbody id="songTableBody">
                    </tbody>
                </table>
            </div>
        </div>

        <div id="noDataMessage" style="text-align: center; padding: 60px;">
            <div style="font-size: 4rem; margin-bottom: 20px;">🎵</div>
            <h2 style="margin-bottom: 15px;">暂无数据</h2>
            <p style="opacity: 0.8;">点击上方"爬取数据"按钮获取网易云音乐热歌榜数据</p>
        </div>

        <footer class="footer">
            <p>网易云音乐热歌榜数据分析系统 © 2024</p>
        </footer>
    </div>

    <script>
        let songData = [];

        function showMessage(message, type) {
            const container = document.getElementById('statusMessage');
            container.innerHTML = `<div class="${type}-message">${message}</div>`;
            setTimeout(() => {
                container.innerHTML = '';
            }, 5000);
        }

        function showLoading(show) {
            document.getElementById('chartsContainer').style.display = show ? 'none' : 'block';
            document.getElementById('noDataMessage').style.display = show ? 'block' : 'none';
        }

        async function scrapeData() {
            showLoading(true);
            showMessage('正在爬取数据...', 'success');

            try {
                const response = await fetch('/api/scrape', {
                    method: 'POST'
                });
                const result = await response.json();

                if (result.success) {
                    songData = result.data;
                    showMessage(`成功获取 ${songData.length} 首歌曲`, 'success');
                    updateStats();
                    updateTable();
                    await refreshCharts();
                    showLoading(false);
                } else {
                    showMessage(`爬取失败: ${result.error}`, 'error');
                }
            } catch (error) {
                showMessage(`请求失败: ${error.message}`, 'error');
            }
        }

        async function analyzeData() {
            if (songData.length === 0) {
                showMessage('请先爬取数据', 'error');
                return;
            }

            try {
                const response = await fetch('/api/analyze');
                const result = await response.json();

                if (result.success) {
                    showMessage(`分析完成: 发现 ${result.artist_count} 位歌手`, 'success');
                    updateStats(result);
                } else {
                    showMessage(`分析失败: ${result.error}`, 'error');
                }
            } catch (error) {
                showMessage(`请求失败: ${error.message}`, 'error');
            }
        }

        async function refreshCharts() {
            if (songData.length === 0) {
                showMessage('请先爬取数据', 'error');
                return;
            }

            try {
                const barResponse = await fetch('/api/chart/bar');
                const barResult = await barResponse.json();
                if (barResult.success) {
                    document.getElementById('barChart').src = `data:image/png;base64,${barResult.image}`;
                }

                const wcResponse = await fetch('/api/chart/wordcloud');
                const wcResult = await wcResponse.json();
                if (wcResult.success) {
                    document.getElementById('wordcloudChart').src = `data:image/png;base64,${wcResult.image}`;
                }

                showMessage('图表刷新完成', 'success');
            } catch (error) {
                showMessage(`刷新失败: ${error.message}`, 'error');
            }
        }

        function exportCSV() {
            if (songData.length === 0) {
                showMessage('请先爬取数据', 'error');
                return;
            }

            window.location.href = '/api/export_csv';
        }

        function updateStats(analysisResult = null) {
            document.getElementById('songCount').textContent = songData.length;

            if (analysisResult) {
                document.getElementById('artistCount').textContent = analysisResult.artist_count;
                if (analysisResult.top_artists && analysisResult.top_artists.length > 0) {
                    document.getElementById('topArtist').textContent = analysisResult.top_artists[0].name;
                }
            }

            document.getElementById('dataTime').textContent = new Date().toLocaleString('zh-CN');
        }

        function updateTable() {
            const tbody = document.getElementById('songTableBody');
            tbody.innerHTML = '';

            songData.slice(0, 50).forEach(song => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${song.rank}</td>
                    <td>${song.title}</td>
                    <td>${song.artist}</td>
                `;
                tbody.appendChild(row);
            });
        }

        async function checkData() {
            try {
                const response = await fetch('/api/data');
                const result = await response.json();

                if (result.success && result.data.length > 0) {
                    songData = result.data;
                    updateStats();
                    updateTable();
                    await refreshCharts();
                    showLoading(false);
                }
            } catch (error) {
                console.log('No cached data');
            }
        }

        document.addEventListener('DOMContentLoaded', checkData);
    </script>
</body>
</html>
